version: 1
name: "Finance department outbound control"

rules:
  - name: "Finance to internal: pass"
    when:
      sender:
        pattern: ["*@finance.example.com"]
      recipient:
        domain: ["example.com"]
    then:
      action: pass

  - name: "Finance to external: replace with tight download limit"
    when:
      sender:
        pattern: ["*@finance.example.com"]
    then:
      action: replace
      max_downloads: 3
      ttl: "14d"

default:
  action: pass
