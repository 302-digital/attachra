version: 1
name: "Large outbound attachments to links"

rules:
  - name: "Internal recipients: large files pass"
    when:
      recipient:
        domain: ["example.com"]
      attachment:
        size: { min: "10MB" }
    then:
      action: pass

  - name: "External recipients: large files become links"
    when:
      attachment:
        size: { min: "10MB" }
    then:
      action: replace
      ttl: "30d"

default:
  action: pass
