# Attachra download-link reverse-proxy snippet for a grommunio host.
#
# Publishes ONLY the package/download page (/p/...) that Attachra's
# rewritten messages link to. This file is a ready-to-drop nginx
# location-only include (no server{} block) for grommunio's own
# location-include directory:
#
#   cp nginx-grommunio.conf /etc/grommunio-common/nginx/locations.d/attachra.conf
#   nginx -t && systemctl reload nginx
#
# grommunio-common already includes everything under
# /etc/grommunio-common/nginx/locations.d/*.conf inside its main
# HTTPS server{} block (listen 443 default_server, grommunio's own TLS
# cert), so no server{} wrapper is needed or wanted here — adding one
# would conflict with grommunio's own. If a future grommunio release
# moves this include path, `nginx -T | grep locations.d` will show you
# where it's actually being pulled in from.
#
# >>> DO NOT expose /api/v1 or /metrics through this or any other
# >>> public-facing proxy. Both are meant to stay on Attachra's
# >>> loopback-only HTTP listener (127.0.0.1:18080) and are protected
# >>> only by Bearer-token auth / nothing at all (/metrics has no auth
# >>> by design, for a local Prometheus scraper) — never bind either to
# >>> a publicly reachable location block.

location /p/ {
    # 18080, not 8080: grommunio-admin's own nginx already owns
    # 0.0.0.0:8080/8443 for its admin UI on a stock host — see
    # /etc/attachra/attachra.yaml's http.listen comment.
    proxy_pass http://127.0.0.1:18080;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    # X-Real-IP is always OVERWRITTEN (proxy_set_header, "set") with
    # nginx's own view of the TCP peer ($remote_addr) — a client cannot
    # spoof it by sending its own X-Real-IP, since nginx replaces
    # whatever the client sent.
    #
    # X-Forwarded-For instead APPENDS ($proxy_add_x_forwarded_for adds
    # $remote_addr to any inbound X-Forwarded-For rather than replacing
    # it), which is the standard, chain-preserving nginx idiom — but it
    # means a client that sends its own X-Forwarded-For value gets that
    # value preserved as the leftmost hop, with nginx's own view
    # appended after it. Attachra's http.trusted_proxies (ATR-311)
    # handles this correctly by reading the header right-to-left and
    # taking the first hop that is NOT one of the trusted proxy
    # addresses, so a spoofed leading value is ignored rather than
    # trusted — this is the required behavior, not a config bug to fix
    # by switching to `set`.
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Attachment downloads can be large; keep buffering off so nginx
    # streams straight through to the client instead of spooling the
    # whole file to disk/memory first.
    proxy_buffering off;
    proxy_request_buffering off;

    # Generous but bounded timeouts for large downloads over slow
    # client links. Tune to your environment/attachment size ceiling
    # (limits.max_attachment_size in attachra.yaml).
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Attachra's /p/<token> package page is GET-only, and the actual
    # per-file download is a same-path POST with a ?ref= parameter
    # (internal/adapters/http/handler.go). HEAD is deliberately NOT
    # allowed here: the handler's ServeHTTP only special-cases GET
    # (package page) and POST (download) — a HEAD request falls
    # through to its generic "method not allowed" 404-shaped response,
    # so there is nothing behind HEAD to serve. Attachra's own per-IP/
    # global rate limiting (http.rate_limit in attachra.yaml) is the
    # primary defense against token-enumeration abuse at this location.
    limit_except GET POST {
        deny all;
    }
}
